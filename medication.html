<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/medication.css">
    <title>Médicaments</title>
</head>
<body>
    <section class="medication"   id="medication">

        <h1>Médicaments</h1>

        <p id="reminder">Il est enregistré dans la page profil que vous souffrez de :</p>

        <form id="formulaire">
            <label for="name">Nom du médicament</label>
            <input type="text" id="namemed" placeholder="Entrer le nom du médicament">

            <label for="dosage">Dosage</label>
            <input type="text" id="dosage" placeholder="Quel est le dosage">

            <label for="frequency">Fréquence</label>
            <input type="text" id="frequency" placeholder="Fréquence quotidienne">

            <label for="duration">Durée</label>
            <input type="text" id="duration" placeholder="Durée du traitement">

            <button type="button" id="addmed">Ajouter</button>
        </form>

        <table class="tablemed" >
            <thead  class="theadclass" id="medthead">
                <tr>
                    <th>Nom du médicament</th>
                    <th>Dosage</th>
                    <th>Fréquence quotidienne</th>
                    <th>Durée du traitement</th>
                    <th>action</th>
                </tr>
            </thead>                                                                                                    

            <tbody   class="tbodymed" id="medtbody">
                <!-- Les médicaments ajoutés apparaîtront ici -->
            </tbody>

        </table>
    </section>

    
     <footer>
        <button    class="btnmed" id="btnmed" type="button">Continuer</button>
    </footer>

     <script src="js/medication.js" defer></script>
     
</body>
</html>

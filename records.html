<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/records.css">
    <title>Historique Médical</title>
</head>
<body>
    <section class="historysection"   id="history">
        <h1>Historique Médical</h1>

        
        <form  class="historyform" id="historyForm">
            <label for="eventDate">Date de l'événement</label>
            <input type="date" id="eventdate">

            <label for="eventType">Type d'événement</label>
            <select id="eventype" name="eventType">
                <option value="">-- Choisir --</option>
                <option value="maladie">Maladie</option>
                <option value="hospitalisation">Hospitalisation</option>
                <option value="consultation">Consultation</option>
                <option value="autre">Autre</option>
            </select>

            <label for="eventDescription">Description</label>
            <input type="text" id="description" placeholder="Détails de l'événement">

            <button type="button" id="addevent">Ajouter</button>
        </form>

        
        <h4>Mes événements médicaux</h4>
        <table class="historytable">
            <thead id="historythead">
                <tr>
                    <th>Date</th>
                    <th>Type d'événement</th>
                    <th>Description </th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="historytbody">
                <!-- Les événements ajoutés apparaîtront ici -->
            </tbody>
        </table>
    </section>

    <footer>
        <button class="btnhis" id="btnhis" type="button">Continuer</button>
    </footer>


    <script src="js/records.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/vaccines.css">
    <title>Vaccins</title>
</head>
<body>
    <section class="vaccine" id="vaccine">
        <h1>Vaccins</h1>
        <form class="vaccineform">
            <label for="vaccineselect">Avez-vous déjà été vacciné ?</label>
            <select id="vaccineselect" name="vaccine">
                <option value="">-- Choisir --</option>
                <option value="oui">Oui</option>
                <option value="non">Non</option>
            </select>

            <div id="vaccinediv" style="display: none;">
                <label for="vaccinetext">Nom</label>
                <input type="text" id="vaccinetext" placeholder="Nom du vaccin">

                <label for="target">Maladie ciblée</label>
                <input type="text" id="target" placeholder="Maladie ciblée ?">

                <label for="date">Date</label>
                <input type="date" id="date">

                <label for="number">Nombre de doses</label>
                <input type="number" id="number" placeholder="Nombre de doses">

                <label for="planned">Rappel prévu</label>
                <input type="date" id="planned">
            </div>


            <button type="button" id="addvaccine">Ajouter</button>
        </form>

        <h4>Mes vaccins enregistrés</h4>
        <table class="tablevac">
            <thead class="theadvac" id="vaccineth">
                <tr>
                    <th>Nom du vaccin</th>
                    <th>Maladie ciblée</th>
                    <th>Date</th>
                    <th>Nombre de doses</th>
                    <th>Rappel prévu</th>
                </tr>
            </thead>
            <tbody class="tbodyvac" id="vaccinetbody">
                <!-- les vaccins apparaitront ici -->
            </tbody>
        </table>
    </section>

    <footer>
        <button class="vaccinebut" id="btnvac" type="button">Continuer</button>
    </footer>

    <script src="js/vaccines.js" defer></script>
</body>
</html>
